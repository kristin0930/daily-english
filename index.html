<title>陈斌每日英语 · 每天一组实用词汇 & 句型</title>
<style>
  :root{--card:#ffffff;--ink:#0f172a;--muted:#64748b;--faint:#94a3b8;--mint:#10b981;--sky:#3b82f6;--line:#e6edf5;--warn:#f59e0b}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(160deg,#eaf4ff,#eafaf1 55%,#fef6f0);background-attachment:fixed;color:var(--ink);min-height:100vh;padding:26px 16px 46px;display:flex;flex-direction:column;align-items:center;position:relative;overflow-x:hidden}

  body::before{width:280px;height:280px;background:#a7f3d0;top:-90px;left:-70px}
  body::after{width:320px;height:320px;background:#bfdbfe;bottom:-110px;right:-90px}
  .wrap{width:100%;max-width:560px;position:relative;z-index:1}
  h1{font-size:32px;font-weight:900;text-align:center;letter-spacing:.5px;background:linear-gradient(90deg,#10b981,#3b82f6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .date{color:var(--mint);font-size:14px;text-align:center;font-weight:800;margin-top:8px}
  .sub{color:var(--muted);font-size:12.5px;text-align:center;margin:4px 0 20px}
  .tabs{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
  .tab{padding:9px 22px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(30,41,59,.05)}
  .tab.on{background:linear-gradient(90deg,#10b981,#3b82f6);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(16,185,129,.28)}
  .bar{height:8px;background:#e2ecf5;border-radius:999px;overflow:hidden;margin-bottom:7px}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#10b981,#3b82f6);border-radius:999px;transition:.4s}
  .meta{display:flex;justify-content:space-between;color:var(--muted);font-size:12.5px;margin-bottom:16px}
  .meta b{color:var(--mint);font-weight:800}
  .card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:32px 26px;min-height:320px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;box-shadow:0 18px 50px rgba(30,64,140,.12);transition:.15s}
  .card:active{transform:scale(.99)}

  @keyframes flipIn{0%{transform:perspective(900px) rotateY(-88deg);opacity:.15}100%{transform:perspective(900px) rotateY(0);opacity:1}}

  .front{text-align:center}
  .badge{display:inline-block;font-size:11px;font-weight:800;color:var(--mint);background:#e7fbf2;padding:4px 12px;border-radius:999px;margin-bottom:16px}
  .front .en{font-size:40px;font-weight:900;letter-spacing:.3px;color:var(--ink);line-height:1.2}
  .spk{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(135deg,#10b981,#3b82f6);color:#fff;font-size:22px;cursor:pointer;margin-top:20px;box-shadow:0 8px 22px rgba(16,185,129,.32)}
  .spk:active{transform:scale(.9)}
  .spk.playing{animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 8px 22px rgba(16,185,129,.32);transform:scale(1)}50%{box-shadow:0 10px 32px rgba(16,185,129,.6);transform:scale(1.06)}}
  .front .tip{color:var(--faint);font-size:13px;margin-top:18px;line-height:1.7}
  .back .en-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .back .en{font-size:27px;font-weight:900;color:var(--ink)}
  .spk-sm{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:16px;border-radius:50%;border:none;background:#e7fbf2;color:var(--mint);cursor:pointer;flex-shrink:0}
  .spk-sm:active{transform:scale(.9)}
  .spk-sm.playing{animation:pulse 1s infinite}
  .back .cn{color:var(--sky);font-size:17px;font-weight:800;margin-bottom:16px}
  .row{margin:12px 0;padding:13px 15px;background:#f7fafd;border-radius:14px;border:1px solid #eef3f8}
  .row .lb{font-size:11px;color:var(--faint);font-weight:800;letter-spacing:1px}
  .row .ex-en{font-size:15px;margin-top:3px;color:var(--ink);font-weight:600}
  .row .ex-cn{font-size:13px;color:var(--muted);margin-top:2px}
  .row .scene{font-size:13.5px;color:#334155;margin-top:3px}
  .btns{display:flex;gap:12px;margin-top:18px}
  .btn{flex:1;padding:14px;border-radius:14px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-size:15px;font-weight:800;cursor:pointer;transition:.15s}
  .btn.good{border-color:transparent;background:linear-gradient(135deg,#10b981,#34d399);color:#fff;box-shadow:0 8px 18px rgba(16,185,129,.28)}
  .btn.again{border-color:#fde3c4;background:#fff7ed;color:var(--warn)}
  .btn:active{transform:scale(.97)}
  .foot{display:flex;justify-content:space-between;margin-top:16px}
  .lnk{color:var(--faint);font-size:13px;background:none;border:none;cursor:pointer;font-weight:600}
  .lnk:active{color:var(--sky)}
  .done{text-align:center;padding:44px 0}
  .done .big{font-size:52px}
  .done h2{font-size:22px;margin:12px 0 6px;color:var(--ink)}
  .done p{color:var(--muted);font-size:14px}
</style>
</head>

<script>

    {en:"on the same page", cn:"达成共识 / 想法一致", ex_en:"I just want to make sure we're on the same page.", ex_cn:"我只是想确认下我们理解一致。", scene:"确认共识"},

    {en:"take ownership", cn:"负起责任 / 主导", ex_en:"She took ownership of the whole project.", ex_cn:"她主导并对整个项目负责。", scene:"讲担责、主人翁"},

    {en:"actionable", cn:"可执行的 / 能落地的", ex_en:"Give me actionable feedback, not just complaints.", ex_cn:"给我能落地的反馈，别光抱怨。", scene:"强调可操作性"},
    {en:"buy-in", cn:"支持 / 认同（尤指上级）", ex_en:"We need buy-in from senior management first.", ex_cn:"我们得先拿到高层的支持。", scene:"争取认可"},

/* ===== 计算“今天是第几天”，切出今日一组 ===== */
function beijingDayIndex(){
  // 用北京时间的日期算“天数序号”，保证同一天所有人一致
  const nowUTC = Date.now();
  const bj = new Date(nowUTC + 8*3600*1000); // 偏到北京时间
  const y = bj.getUTCFullYear(), m = bj.getUTCMonth(), d = bj.getUTCDate();
  return Math.floor(Date.UTC(y, m, d) / (86400*1000)); // 距 1970-01-01 的天数
}
function pickToday(arr, perDay, dayIdx){
  const n = arr.length;
  const start = (dayIdx * perDay) % n;
  const out = [];
  for(let i=0;i<perDay;i++){ out.push(arr[(start+i)%n]); }
  return out;
}
function dateLabel(){
  const bj = new Date(Date.now() + 8*3600*1000);
  const y=bj.getUTCFullYear(), m=bj.getUTCMonth()+1, d=bj.getUTCDate();
  const wk=["周日","周一","周二","周三","周四","周五","周六"][bj.getUTCDay()];
  return `${y}年${m}月${d}日 · ${wk}`;
}

const DAY = beijingDayIndex();
const DATESTR = dateLabel();
const DATA = {
  words: pickToday(POOL.words, WORDS_PER_DAY, DAY),
  patterns: pickToday(POOL.patterns, PATTERNS_PER_DAY, DAY)
};

/* ===== 逻辑 ===== */
let deck = "words";
let idx = 0;
let flipped = false;
const KEY = "daily-en-known-" + DAY;   // 进度按“天”存，第二天自动是新的一组
let known = JSON.parse(localStorage.getItem(KEY) || "{}");

function list(){ return DATA[deck]; }
function knownSet(){ known[deck] = known[deck] || []; return known[deck]; }
function save(){ localStorage.setItem(KEY, JSON.stringify(known)); }

function render(){
  const arr = list(), n = arr.length;
  document.getElementById("pos").textContent = (Math.min(idx,n-1)+1) + " / " + n;
  document.getElementById("known").textContent = knownSet().length;
  document.getElementById("barfill").style.width = Math.round(knownSet().length/n*100) + "%";
  const stage = document.getElementById("stage");

  if(idx >= n){
    stage.innerHTML = `<div class="card"><div class="done"><div class="big">🎉</div>
      <h2>今日这组过完啦</h2><p>已掌握 ${knownSet().length}/${n} · 明天自动换新一组</p>
      <div class="btns" style="margin-top:18px"><button class="btn" onclick="restart(false)">再过一遍</button>
      <button class="btn good" onclick="restart(true)">洗牌重练</button></div></div></div>`;
    return;
  }
  const item = arr[idx];
  const isKnown = knownSet().includes(item.en);
  if(!flipped){
    stage.innerHTML = `<div class="card enter" onclick="flip()">
      <div class="front">
        ${isKnown?'<div class="badge">✓ 已掌握</div>':''}
        <div class="en">${item.en}</div>
        <button class="spk" onclick="event.stopPropagation();speakCurrent(this)" title="听发音">🔊</button>
        <div class="tip">点卡片看释义和例句 👆<br>点 🔊 听发音</div>
      </div></div>`;
  } else {
    stage.innerHTML = `<div class="card flipping">
      <div class="back">
        <div class="en-row"><div class="en">${item.en}</div>
          <button class="spk-sm" onclick="speakCurrent(this)" title="听发音">🔊</button></div>
        <div class="cn">${item.cn}</div>
        <div class="row"><div class="lb">例句 EXAMPLE</div><div class="ex-en">${item.ex_en}</div><div class="ex-cn">${item.ex_cn}</div></div>
        <div class="row"><div class="lb">场景 WHEN TO USE</div><div class="scene">${item.scene}</div></div>
      </div>
      <div class="btns">
        <button class="btn again" onclick="mark(false)">✗ 再练</button>
        <button class="btn good" onclick="mark(true)">✓ 记住了</button>
      </div>
      <div class="foot"><button class="lnk" onclick="prev()">← 上一个</button><button class="lnk" onclick="next()">跳过 →</button></div>
    </div>`;
  }
}
/* ===== 发音：浏览器语音合成 ===== */
function speakCurrent(btn){
  const item = list()[idx]; if(!item) return;
  // 去掉括号注释(如 loop (sb) in → loop in)，让发音更自然
  const text = item.en.replace(/\([^)]*\)/g,' ').replace(/\s+/g,' ').trim();
  speak(text, btn);
}
function speak(text, btn){
  if(!('speechSynthesis' in window)){ return; }
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9; u.pitch = 1;
    if(btn){ btn.classList.add('playing');
      u.onend = ()=>btn.classList.remove('playing');
      u.onerror = ()=>btn.classList.remove('playing'); }
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function flip(){ flipped = true; render(); if(deck==='words'){ setTimeout(()=>speakCurrent(document.querySelector('.spk-sm')),120); } }
function next(){ idx++; flipped=false; render(); }
function prev(){ if(idx>0){idx--; flipped=false; render();} }
function mark(good){
  const item = list()[idx];
  const s = knownSet();
  if(good){ if(!s.includes(item.en)) s.push(item.en); }
  else { const i=s.indexOf(item.en); if(i>=0) s.splice(i,1); }
  save(); next();
}
function restart(shuffle){
  idx=0; flipped=false;
  if(shuffle){ DATA[deck].sort(()=>Math.random()-0.5); }
  render();
}
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
    t.classList.add("on");
    deck = t.dataset.deck; idx=0; flipped=false; render();
  };
});
document.getElementById("today").textContent = DATESTR;
render();
</script>
